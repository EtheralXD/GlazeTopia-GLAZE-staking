<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Glaze Staking Test</title>
    <link rel="stylesheet" href="globals.css">

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.16.0/dist/ethers.umd.min.js"></script>
    <script src="app.js" defer></script>

</head>
<body>
    <div class="container mt-5 d-flex justify-content-center">
        <div class="w-50">
            <div class="my-box">    
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1 class="h1 mb-0">Glaze Staking Test</h1>
                    <button id="connectWallet" class="btn btn-primary">Connect Wallet</button>
                </div>

                <div class="mb-3">
                    <input type="number" id="stakeAmount" class="form-control mb-2" placeholder="$GLAZE to stake">
                    <button id="stakeBtn" class="btn btn-success w-100">Stake</button>
                </div>

                <div class="mb-3">
                    <button id="checkStakeBtn" class="btn btn-info w-100 mb-2">Check Stake</button>
                    <span id="stakeInfo"></span>
                </div>

                <div class="mb-3">
                    <button id="withdrawBtn" class="btn btn-warning w-100">Withdraw</button>
                </div>
            </div>
            <div id="message" class="message"></div>
        </div>
    </div>
</body>
</html>
